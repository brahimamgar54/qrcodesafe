<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadowfax QR | Mode Pur</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #000; --bg: #ffffff; }
        body { font-family: sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Générateur QR Pur</h2>
        <input type="text" id="urlInput" placeholder="Collez votre lien ici" value="https://">
        
        <label>Nombre de tables (pages) :</label>
        <select id="tableCount">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="30">30</option>
        </select>

        <button onclick="generatePurePDF()">TÉLÉCHARGER PDF</button>
    </div>

    <canvas id="qrCanvas"></canvas>

    <script>
        const { jsPDF } = window.jspdf;

        function generatePurePDF() {
            const url = document.getElementById('urlInput').value;
            const count = parseInt(document.getElementById('tableCount').value);
            
            if (!url || url === "https://") return alert("Lien invalide");

            const doc = new jsPDF();
            const canvas = document.getElementById('qrCanvas');
            const qrSize = 1200; // Haute définition

            for (let i = 1; i <= count; i++) {
                if (i > 1) doc.addPage();

                new QRious({
                    element: canvas,
                    value: url,
                    size: qrSize,
                    level: 'H'
                });

                const qrImage = canvas.toDataURL('image/png');

                // On place juste le QR Code au centre de la page A4
                // x: 35, y: 70, largeur: 140, hauteur: 140
                doc.addImage(qrImage, 'PNG', 35, 70, 140, 140);
            }

            doc.save(`QR_Pur_1a${count}.pdf`);
        }
    </script>
</body>
</html>
