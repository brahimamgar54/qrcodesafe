<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadowfax QR | Générateur de Table Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #000000; --bg: #f4f4f4; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); color: black; text-align: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, select { width: 85%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 90%; margin-top: 20px; }
        button:hover { background: #333; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Générateur QR Tables 📋</h1>
        <p>Générez vos codes QR comme sur votre modèle PDF.</p>

        <input type="text" id="urlInput" placeholder="Lien du menu (ex: https://...)" value="https://">
        
        <label>Nombre de tables (1 page par table) :</label>
        <select id="tableCount">
            <option value="5">5 Tables</option>
            <option value="10" selected>10 Tables</option>
            <option value="20">20 Tables</option>
            <option value="30">30 Tables</option>
        </select>

        <button onclick="generateCleanPDF()">TÉLÉCHARGER LE PDF (HD)</button>
    </div>

    <canvas id="qrCanvas"></canvas>

    <script>
        const { jsPDF } = window.jspdf;

        async function generateCleanPDF() {
            const url = document.getElementById('urlInput').value;
            const count = parseInt(document.getElementById('tableCount').value);
            
            if (!url || url === "https://") return alert("Veuillez entrer le lien de votre menu !");

            const doc = new jsPDF();
            const qrSize = 1200; // Très haute définition pour impression

            for (let i = 1; i <= count; i++) {
                if (i > 1) doc.addPage();

                // 1. Génération du QR Code Net (Sans logo)
                const canvas = document.getElementById('qrCanvas');
                new QRious({
                    element: canvas,
                    value: url,
                    size: qrSize,
                    level: 'H' // Correction maximale
                });

                const qrImage = canvas.toDataURL('image/png');

                // 2. Mise en page conforme au PDF fourni
                doc.setFont("helvetica", "bold");
                
                // Texte du haut
                doc.setFontSize(24);
                doc.text("LE MENU EST ICI ↓", 105, 50, { align: "center" });

                // QR Code principal (grand et centré)
                doc.addImage(qrImage, 'PNG', 45, 75, 120, 120);

                // Texte du bas (Numéro de table)
                doc.setFontSize(20);
                doc.text(`Table ${i}`, 105, 220, { align: "center" });
            }

            doc.save(`Shadowfax_QR_Tables_1a${count}.pdf`);
        }
    </script>
</body>
</html>
