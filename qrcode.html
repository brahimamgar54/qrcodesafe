<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de QR Code Gratuit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; width: 250px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 20px; }
        button { padding: 10px 20px; background: #ff4500; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #qrcode { margin-top: 20px; padding: 10px; background: white; }
        #download { margin-top: 20px; display: none; text-decoration: none; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Générateur de QR Code</h2>
        <p>Entrez le lien de votre menu :</p>
        <input type="text" id="url" placeholder="https://votre-site.vercel.app">
        <br>
        <button onclick="generateQR()">Générer le QR Code</button>
        
        <div id="qrcode"></div>
        
        <a id="download" download="qrcode-menu.png">📥 Télécharger l'image</a>
    </div>

    <script>
        function generateQR() {
            const url = document.getElementById('url').value;
            const qrcodeDiv = document.getElementById('qrcode');
            const downloadLink = document.getElementById('download');

            // On vide le QR code précédent s'il existe
            qrcodeDiv.innerHTML = "";

            if (url.trim() !== "") {
                // Génération du QR Code
                const qrcode = new QRCode(qrcodeDiv, {
                    text: url,
                    width: 200,
                    height: 200,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });

                // Petit délai pour laisser le temps au QR code de se dessiner avant de permettre le téléchargement
                setTimeout(() => {
                    const img = qrcodeDiv.querySelector('img');
                    if (img) {
                        downloadLink.href = img.src;
                        downloadLink.style.display = "block";
                    }
                }, 300);
            } else {
                alert("Veuillez entrer un lien valide !");
            }
        }
    </script>
</body>
</html>
